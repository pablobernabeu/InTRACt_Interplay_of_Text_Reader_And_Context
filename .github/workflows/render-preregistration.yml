# Auto-renders the preregistration (preregistration/preregistration.qmd) to two
# standalone files - a self-contained HTML and a PDF, date-stamped by the
# project's _rename-output.R post-render script - and commits them into the
# preregistration/ folder.
#
# Runs on every push to main and on manual dispatch (these commit the rendered
# files back). Pull requests to main render the document as a build check only,
# without committing. The rendered .html/.pdf are excluded from the trigger
# paths and the auto-commit carries [skip ci], so the auto-commit never
# re-triggers the workflow.

name: Render preregistration

on:
  push:
    branches: [main]
    paths:
      - 'preregistration/**'
      - '!preregistration/*.html'
      - '!preregistration/*.pdf'
      - 'mindmap/mindmap.png'
      - '.github/workflows/render-preregistration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'preregistration/**'
      - '!preregistration/*.html'
      - '!preregistration/*.pdf'
      - 'mindmap/mindmap.png'
      - '.github/workflows/render-preregistration.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: render-preregistration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Render PDF + HTML
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Times New Roman (msttcorefonts)
        run: |
          set -euo pipefail
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" \
            | sudo debconf-set-selections
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ttf-mscorefonts-installer fontconfig
          sudo fc-cache -f
          fc-list | grep -i "Times New Roman" \
            || { echo "ERROR: Times New Roman was not installed"; exit 1; }

      - name: Set up R (for the _rename-output.R post-render script)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up Quarto and TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Render preregistration (PDF + self-contained HTML)
        working-directory: preregistration
        run: quarto render

      - name: Commit rendered drafts to preregistration/
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "preregistration/InTRACt preregistration draft - "*.pdf \
                  "preregistration/InTRACt preregistration draft - "*.html
          if git diff --cached --quiet; then
            echo "No rendered changes to commit."
          else
            git commit -m "Auto-render preregistration drafts [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
