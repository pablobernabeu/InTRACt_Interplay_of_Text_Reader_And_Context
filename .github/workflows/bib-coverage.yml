# Keeps the systematic review's verified spreadsheet in step with the
# preregistration bibliography (systematic_review/check_bib_coverage.py).
#
# On pull requests to main the spreadsheet is checked as a build gate: the job
# fails if any review DOI is missing from the bibliography or if the
# citation_key column is stale. On push to main (and manual dispatch) the
# citation_key column is refreshed from the bibliography and committed back; the
# auto-commit carries [skip ci] so it never re-triggers the workflow.

name: Bibliography coverage

on:
  push:
    branches: [main]
    paths:
      - 'systematic_review/**'
      - 'preregistration/InTRACt references.bib'
      - '.github/workflows/bib-coverage.yml'
  pull_request:
    branches: [main]
    paths:
      - 'systematic_review/**'
      - 'preregistration/InTRACt references.bib'
      - '.github/workflows/bib-coverage.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bib-coverage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  coverage:
    name: Check DOI coverage and citation keys
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check coverage (pull request build gate)
        if: github.event_name == 'pull_request'
        run: python systematic_review/check_bib_coverage.py

      - name: Refresh citation keys and commit
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          set -uo pipefail
          set +e
          python systematic_review/check_bib_coverage.py --write
          status=$?
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add systematic_review/verified_extraction.csv
          if git diff --cached --quiet; then
            echo "citation_key column already up to date."
          else
            git commit -m "Refresh review citation keys [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
          exit $status
